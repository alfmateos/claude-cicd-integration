# ── .github/workflows/claude-ci.yml ──
# DevSecOps pipeline with shift-left security + AI auto-remediation.
# The auto-fix stage opens a NEW PR with fixes (never commits directly).

name: Claude DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # ════════════════════════════════════════════════
  # STAGE 1: Tests
  # ════════════════════════════════════════════════
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v

  # ════════════════════════════════════════════════
  # STAGE 2: Security scanning (parallel)
  # ════════════════════════════════════════════════

  sast-bandit:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run Bandit SAST scan
        run: |
          pip install bandit
          bandit -r src/ -f json -o bandit-report.json --exit-zero
          bandit -r src/ -f screen || true
      - uses: actions/upload-artifact@v4
        with:
          name: bandit-sast-report
          path: bandit-report.json

  sca-pip-audit:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run pip-audit SCA scan
        run: |
          pip install pip-audit
          pip install -r requirements.txt
          pip-audit --format=json --output=pip-audit-report.json || true
          pip-audit || true
      - uses: actions/upload-artifact@v4
        with:
          name: pip-audit-sca-report
          path: pip-audit-report.json

  secret-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run secret scan
        run: |
          pip install detect-secrets
          detect-secrets scan --all-files --force-use-all-plugins > secrets-report.json
          SECRETS_COUNT=$(python3 -c "
          import json
          with open('secrets-report.json') as f:
              data = json.load(f)
          count = sum(
              len(v) for k, v in data.get('results', {}).items()
              if '.env.example' not in k
          )
          print(count)
          ")
          echo "Secrets found (excluding .env.example): $SECRETS_COUNT"
          if [ "$SECRETS_COUNT" -gt 0 ]; then
            echo "::warning::Found $SECRETS_COUNT potential secrets in code!"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: secrets-scan-report
          path: secrets-report.json

  # ════════════════════════════════════════════════
  # STAGE 3: AI security review (comments on PR)
  # Skips if triggered by a bot (prevents loops)
  # ════════════════════════════════════════════════
  ai-code-review:
    runs-on: ubuntu-latest
    needs: [sast-bandit, sca-pip-audit, secret-scan]
    if: |
      github.event_name == 'pull_request' &&
      github.actor != 'claude[bot]'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: bandit-sast-report
          path: reports/
      - uses: actions/download-artifact@v4
        with:
          name: pip-audit-sca-report
          path: reports/
      - uses: actions/download-artifact@v4
        with:
          name: secrets-scan-report
          path: reports/

      - name: AI security review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are a senior security engineer reviewing PR #${{ github.event.pull_request.number }}.

            1. Read ALL Python code in src/
            2. Read the security scan reports in reports/:
               - bandit-report.json (SAST)
               - pip-audit-report.json (SCA)
               - secrets-report.json (secrets)
            3. Cross-reference scan results with the actual code.

            Provide a security assessment as a PR comment with:
            - SAST findings (with file, line, severity, CWE)
            - Dependency vulnerabilities (package, CVE, fix version)
            - Secrets detected (file, line, type)
            - Code quality issues
            - Overall risk level: low / medium / high / critical
            - A 2-3 sentence summary
          claude_args: |
            --max-turns 5
            --allowedTools Read,Bash(cat:*),Bash(jq:*)

  # ════════════════════════════════════════════════
  # STAGE 4: AI auto-fix → opens a NEW PR
  # Claude creates a branch, fixes code, runs tests,
  # and opens a PR targeting YOUR branch for review.
  # ════════════════════════════════════════════════
  ai-auto-fix:
    runs-on: ubuntu-latest
    needs: ai-code-review
    if: |
      github.event_name == 'pull_request' &&
      github.actor != 'claude[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - uses: actions/download-artifact@v4
        with:
          name: bandit-sast-report
          path: reports/
      - uses: actions/download-artifact@v4
        with:
          name: pip-audit-sca-report
          path: reports/
      - uses: actions/download-artifact@v4
        with:
          name: secrets-scan-report
          path: reports/

      - name: AI auto-fix
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Claude will create a branch from your PR branch
          base_branch: ${{ github.head_ref }}
          prompt: |
            You are a senior security engineer. Fix the code issues found.

            1. Read the security scan reports in reports/:
               - bandit-report.json (SAST findings)
               - pip-audit-report.json (dependency CVEs)
               - secrets-report.json (leaked secrets)
            2. Read the source code in src/ and tests/

            For each real issue found, EDIT the actual files:
            - Fix security vulnerabilities in src/
            - Add edge-case tests in tests/
            - Update requirements.txt if deps need upgrading

            Rules:
            - Only fix real security or correctness issues
            - Do NOT refactor for style alone
            - Do NOT break existing functionality
            - Do NOT modify files in reports/ or .github/
            - Keep all existing tests passing

            After fixing, run: python -m pytest tests/ -v
            If tests fail, revert and try a different approach.
            Only leave changes that pass all tests.

            When done, create a commit with a clear message describing
            what was fixed and why.
          claude_args: |
            --max-turns 15
            --allowedTools Read,Write,Edit,Bash(python:*),Bash(pip:*),Bash(pytest:*),Bash(cat:*),Bash(git:*)
