# ── .github/workflows/claude-ci.yml ──
# DevSecOps pipeline with shift-left security + AI-powered remediation.
# Free for public repos on GitHub Actions.

name: Claude DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ════════════════════════════════════════════════
  # STAGE 1: Tests (always runs)
  # ════════════════════════════════════════════════
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v

  # ════════════════════════════════════════════════
  # STAGE 2: Security scanning (parallel jobs)
  # ════════════════════════════════════════════════

  # ── 2a. SAST: Static vulnerability analysis ──
  sast-bandit:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit SAST scan
        run: |
          bandit -r src/ -f json -o bandit-report.json --exit-zero
          bandit -r src/ -f screen || true
          echo "── Bandit scan complete ──"

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-sast-report
          path: bandit-report.json

  # ── 2b. SCA: Dependency vulnerability check ──
  sca-pip-audit:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Run pip-audit SCA scan
        run: |
          pip-audit --format=json --output=pip-audit-report.json || true
          pip-audit || true
          echo "── pip-audit scan complete ──"

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-sca-report
          path: pip-audit-report.json

  # ── 2c. Secret scanning ──
  secret-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run secret scan
        run: |
          detect-secrets scan --all-files --force-use-all-plugins \
            > secrets-report.json
          echo "── Secret scan complete ──"

          # Count secrets found (excluding .env.example which is a template)
          SECRETS_COUNT=$(python3 -c "
          import json
          with open('secrets-report.json') as f:
              data = json.load(f)
          count = sum(
              len(v) for k, v in data.get('results', {}).items()
              if '.env.example' not in k
          )
          print(count)
          ")
          echo "Secrets found (excluding .env.example): $SECRETS_COUNT"
          if [ "$SECRETS_COUNT" -gt 0 ]; then
            echo "::warning::Found $SECRETS_COUNT potential secrets in code!"
          fi

      - name: Upload secrets report
        uses: actions/upload-artifact@v4
        with:
          name: secrets-scan-report
          path: secrets-report.json

  # ════════════════════════════════════════════════
  # STAGE 3: AI code review (reads security scan results)
  # ════════════════════════════════════════════════
  ai-code-review:
    runs-on: ubuntu-latest
    needs: [sast-bandit, sca-pip-audit, secret-scan]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      # Download all security scan reports so Claude can read them
      - uses: actions/download-artifact@v4
        with:
          name: bandit-sast-report
          path: reports/

      - uses: actions/download-artifact@v4
        with:
          name: pip-audit-sca-report
          path: reports/

      - uses: actions/download-artifact@v4
        with:
          name: secrets-scan-report
          path: reports/

      - name: AI code review with security context
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "You are a senior security engineer doing a code review.

          1. Read ALL the Python code in src/
          2. Read ALL the security scan reports in reports/:
             - bandit-report.json (SAST findings)
             - pip-audit-report.json (dependency CVEs)
             - secrets-report.json (leaked secrets)
          3. Cross-reference the scan results with the actual code.

          Output a JSON object with these fields:
          - sast_findings: array of {file, line, severity, cwe, message}
          - dependency_issues: array of {package, installed_version, fix_version, cve}
          - secrets_found: array of {file, line, type}
          - code_quality: array of {file, line, severity, message}
          - overall_risk: low | medium | high | critical
          - summary: a 2-3 sentence human-readable summary" \
            --output-format json \
            --max-turns 5 \
            | tee review-results.json

      - name: Upload AI review
        uses: actions/upload-artifact@v4
        with:
          name: ai-security-review
          path: review-results.json

  # ════════════════════════════════════════════════
  # STAGE 4: AI auto-fix (proposes fixes for findings)
  # ════════════════════════════════════════════════
  ai-auto-fix:
    runs-on: ubuntu-latest
    needs: ai-code-review
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: |
          npm install -g @anthropic-ai/claude-code
          pip install -r requirements.txt

      - uses: actions/download-artifact@v4
        with:
          name: ai-security-review
          path: reports/

      - name: AI auto-fix proposal
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "You are a senior security engineer. Your job is to FIX issues.

          1. Read the AI security review in reports/review-results.json
          2. Read the code in src/ and tests/

          For EACH issue found, generate a concrete fix. Output a markdown
          report with this structure:

          # Security auto-fix report

          ## Critical and high severity fixes
          (For each: what the issue is, the fix as a code diff, and why)

          ## Medium severity fixes
          (Same format)

          ## Low severity and style fixes
          (Same format)

          ## Suggested new tests
          (pytest functions that test the security edge cases found)

          ## Dependency updates
          (If any packages need updating, show the updated requirements.txt lines)

          Be specific. Show actual code, not just descriptions." \
            --output-format text \
            --max-turns 5 \
            | tee auto-fix-report.md

      - name: Verify fixes dont break tests
        run: |
          echo "── Running tests to verify nothing is broken ──"
          python -m pytest tests/ -v || true

      - name: Upload auto-fix report
        uses: actions/upload-artifact@v4
        with:
          name: ai-auto-fix-report
          path: auto-fix-report.md