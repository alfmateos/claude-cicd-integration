# ── .github/workflows/claude-ci.yml ──
# DevSecOps pipeline using the official claude-code-action.
# Stage 4 uses Claude to fix code, validate with tests, and commit to the PR.

name: Claude DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ════════════════════════════════════════════════
  # STAGE 1: Tests (always runs)
  # ════════════════════════════════════════════════
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v

  # ════════════════════════════════════════════════
  # STAGE 2: Security scanning (3 parallel jobs)
  # ════════════════════════════════════════════════

  # ── 2a. SAST ──
  sast-bandit:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Bandit SAST scan
        run: |
          pip install bandit
          bandit -r src/ -f json -o bandit-report.json --exit-zero
          bandit -r src/ -f screen || true

      - uses: actions/upload-artifact@v4
        with:
          name: bandit-sast-report
          path: bandit-report.json

  # ── 2b. SCA ──
  sca-pip-audit:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run pip-audit SCA scan
        run: |
          pip install pip-audit
          pip install -r requirements.txt
          pip-audit --format=json --output=pip-audit-report.json || true
          pip-audit || true

      - uses: actions/upload-artifact@v4
        with:
          name: pip-audit-sca-report
          path: pip-audit-report.json

  # ── 2c. Secret scanning ──
  secret-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run secret scan
        run: |
          pip install detect-secrets
          detect-secrets scan --all-files --force-use-all-plugins > secrets-report.json

          SECRETS_COUNT=$(python3 -c "
          import json
          with open('secrets-report.json') as f:
              data = json.load(f)
          count = sum(
              len(v) for k, v in data.get('results', {}).items()
              if '.env.example' not in k
          )
          print(count)
          ")
          echo "Secrets found (excluding .env.example): $SECRETS_COUNT"
          if [ "$SECRETS_COUNT" -gt 0 ]; then
            echo "::warning::Found $SECRETS_COUNT potential secrets in code!"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: secrets-scan-report
          path: secrets-report.json

  # ════════════════════════════════════════════════
  # STAGE 3: AI security review (reads all scan reports)
  # Uses claude-code-action with structured JSON output
  # ════════════════════════════════════════════════
  ai-code-review:
    runs-on: ubuntu-latest
    needs: [sast-bandit, sca-pip-audit, secret-scan]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: bandit-sast-report
          path: reports/

      - uses: actions/download-artifact@v4
        with:
          name: pip-audit-sca-report
          path: reports/

      - uses: actions/download-artifact@v4
        with:
          name: secrets-scan-report
          path: reports/

      - name: AI security review
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are a senior security engineer reviewing PR #${{ github.event.pull_request.number }}.

            1. Read ALL Python code in src/
            2. Read the security scan reports in reports/:
               - bandit-report.json (SAST)
               - pip-audit-report.json (SCA)
               - secrets-report.json (secrets)
            3. Cross-reference scan results with the actual code.

            Provide a security assessment as a PR comment with:
            - SAST findings (with file, line, severity, CWE)
            - Dependency vulnerabilities (package, CVE, fix version)
            - Secrets detected (file, line, type)
            - Code quality issues
            - Overall risk level: low / medium / high / critical
            - A 2-3 sentence summary
          claude_args: |
            --max-turns 5
            --allowedTools Read,Bash(cat:*),Bash(jq:*)

  # ════════════════════════════════════════════════
  # STAGE 4: AI auto-fix + test + commit
  # Claude edits files, pytest validates, commit if green
  # ════════════════════════════════════════════════
  ai-auto-fix:
    runs-on: ubuntu-latest
    needs: ai-code-review
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - uses: actions/download-artifact@v4
        with:
          name: bandit-sast-report
          path: reports/

      - uses: actions/download-artifact@v4
        with:
          name: pip-audit-sca-report
          path: reports/

      - uses: actions/download-artifact@v4
        with:
          name: secrets-scan-report
          path: reports/

      - name: AI auto-fix
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are a senior security engineer. Your job is to FIX code issues.

            1. Read the security scan reports in reports/:
               - bandit-report.json (SAST findings)
               - pip-audit-report.json (dependency CVEs)
               - secrets-report.json (leaked secrets)
            2. Read the source code in src/ and tests/

            For each real issue found, EDIT the actual files to fix them:
            - Fix security vulnerabilities in src/
            - Add edge-case tests in tests/
            - Update requirements.txt if deps need upgrading

            Rules:
            - Only fix real security or correctness issues
            - Do NOT refactor for style alone
            - Do NOT break existing functionality
            - Do NOT modify files in reports/ or .github/
            - Keep all existing tests passing

            After fixing, run: python -m pytest tests/ -v
            If tests fail, revert your changes and try a different approach.
            Only leave changes that pass all tests.
          claude_args: |
            --max-turns 15
            --allowedTools Read,Write,Edit,Bash(python:*),Bash(pip:*),Bash(cat:*),Bash(pytest:*)

      # Commit only if there are actual changes and tests pass
      - name: Validate and commit fixes
        run: |
          # Final safety check: run tests one more time
          if ! python -m pytest tests/ -v; then
            echo "::warning::Tests failing after AI fixes — reverting all changes"
            git checkout -- .
            exit 0
          fi

          # Check if Claude made any changes
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit — code was already clean"
            exit 0
          fi

          git config user.name "claude[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git reset -- reports/ .github/

          if git diff --cached --quiet; then
            echo "No relevant changes after filtering"
            exit 0
          fi

          git commit -m "fix(security): auto-fix from DevSecOps pipeline

          Applied automated fixes based on Bandit, pip-audit,
          and detect-secrets scan results.

          All tests verified passing before commit.
          Co-authored-by: Claude <claude[bot]@users.noreply.github.com>"

          git push
          echo "✅ Security fixes committed to PR branch"
