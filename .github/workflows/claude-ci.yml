# ── .github/workflows/claude-ci.yml ──
# Same pipeline logic as docker-compose.yml, but running
# natively on GitHub Actions (free for public repos).

name: Claude CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Stage 1: Run tests (standard, no AI needed) ──
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v

  # ── Stage 2: AI code review via Claude Code ──
  code-review:
    runs-on: ubuntu-latest
    needs: test                        # ← replaces depends_on
    # Only burn API credits on PRs, not every push
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run AI code review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "Review the Python code in src/.
            Focus on bugs, security issues, and style.
            Output a short JSON summary with fields:
            issues (array of {file, line, severity, message}),
            overall_quality (1-10)." \
            --output-format json \
            --max-turns 3 \
            | tee review-results.json

      - name: Upload review results
        uses: actions/upload-artifact@v4
        with:
          name: code-review
          path: review-results.json

  # ── Stage 3: AI test suggestions ──
  suggestions:
    runs-on: ubuntu-latest
    needs: code-review                 # ← replaces depends_on
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate test suggestions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "Read src/calculator.py and tests/test_calculator.py.
            Suggest 3 additional edge-case tests that are missing.
            Output each as a pytest function in plain text." \
            --output-format text \
            --max-turns 3 \
            | tee suggestions.txt

      - name: Upload suggestions
        uses: actions/upload-artifact@v4
        with:
          name: test-suggestions
          path: suggestions.txt
