# ── .github/workflows/claude-assistant.yml ──
# Interactive AI assistant: mention @claude in any PR or issue comment.
# When asked to change code, Claude opens a NEW PR for human review.

name: Claude Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    runs-on: ubuntu-latest
    # Only trigger for @claude mentions, never for bot comments
    if: |
      (
        contains(github.event.comment.body || '', '@claude') ||
        contains(github.event.issue.body || '', '@claude')
      ) &&
      github.event.sender.type != 'Bot'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --max-turns 15
            --allowedTools Read,Write,Edit,Bash(python:*),Bash(pip:*),Bash(pytest:*),Bash(cat:*),Bash(git:*)
